CONFIG_PM=n
CONFIG_FLASH=y
CONFIG_FPROTECT=y
CONFIG_MAIN_STACK_SIZE=10240
CONFIG_MULTITHREADING=y

CONFIG_BOOT_SWAP_SAVE_ENCTLV=n
CONFIG_BOOT_ENCRYPT_IMAGE=n
CONFIG_BOOT_UPGRADE_ONLY=n
CONFIG_BOOT_BOOTSTRAP=n
CONFIG_BOOT_MAX_IMG_SECTORS_AUTO=n
CONFIG_BOOT_MAX_IMG_SECTORS=512

# Use the legacy swap-move algorithm
CONFIG_BOOT_PREFER_SWAP_OFFSET=n
CONFIG_BOOT_SWAP_USING_MOVE=y

CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_SPI_NOR_SFDP_DEVICETREE=y

# UART0 is used for MCUmgr serial recovery on Thingy:91 X and nRF9151 DK.
# The Zephyr console cannot share that UART with the serial adapter — see
# bootloader/mcuboot/boot/zephyr/serial_adapter.c.
CONFIG_CONSOLE=n
CONFIG_CONSOLE_HANDLER=n
CONFIG_UART_CONSOLE=n
CONFIG_MCUBOOT_SERIAL=y
CONFIG_MCUBOOT_SERIAL_DIRECT_IMAGE_UPLOAD=y
CONFIG_BOOT_SERIAL_IMG_GRP_IMAGE_STATE=y

# Secondary slot on external SPI-NOR (att_flash_partitions.dtsi).
CONFIG_PM_EXTERNAL_FLASH_MCUBOOT_SECONDARY=y
CONFIG_PM_OVERRIDE_EXTERNAL_DRIVER_CHECK=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=0
CONFIG_MCUBOOT_LOG_LEVEL_INF=y

### Decrease footprint by ~4 KB in comparison to CBPRINTF_COMPLETE=y
CONFIG_CBPRINTF_NANO=y
CONFIG_NRF_RTC_TIMER_USER_CHAN_COUNT=0
### Use the minimal C library to reduce flash usage
CONFIG_MINIMAL_LIBC=y

# b0 only accepts an MCUboot update if its embedded fw_info version is
# strictly greater than the version currently in s0. Bump this single
# counter whenever cutting a release that ships a new MCUboot.
CONFIG_FW_INFO=y
CONFIG_FW_INFO_FIRMWARE_VERSION=2
