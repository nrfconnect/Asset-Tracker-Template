# nRF54LM20 uses RRAM — no external SPI NOR flash and no FPROTECT support
CONFIG_SPI_NOR=n
CONFIG_FPROTECT=n
CONFIG_BOOT_WATCHDOG_FEED=n

# MCUboot on nRF54L requires a larger main stack to avoid MPU faults
CONFIG_MAIN_STACK_SIZE=16384

# App slot is ~925 KB / 4 KB erase-block = ~232 sectors; use 256 to have margin
CONFIG_BOOT_MAX_IMG_SECTORS=256

CONFIG_MULTITHREADING=y
