#
# Thingy:91 X has no on-board debugger - mcuboot's serial recovery over
# USB CDC ACM is the only way to reflash without external hardware. Disable
# the regular console so it does not race with the serial-recovery channel.
CONFIG_CONSOLE=n
CONFIG_CONSOLE_HANDLER=n
CONFIG_UART_CONSOLE=n
CONFIG_MCUBOOT_SERIAL=y
CONFIG_MCUBOOT_SERIAL_DIRECT_IMAGE_UPLOAD=y
CONFIG_BOOT_SERIAL_IMG_GRP_IMAGE_STATE=y
