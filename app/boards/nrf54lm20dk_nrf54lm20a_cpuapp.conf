# --- UART configuration for Serial Modem ---
CONFIG_UART_ASYNC_API=y

# --- Modem cellular driver (nordic,nrf91-slm over CMUX + PPP) ---
CONFIG_MODEM=y
CONFIG_MODEM_CELLULAR=y
CONFIG_MODEM_CELLULAR_PERIODIC_SCRIPT_MS=20000
CONFIG_MODEM_BACKEND_UART_ASYNC=y
CONFIG_MODEM_BACKEND_UART_ASYNC_HWFC=y
CONFIG_MODEM_CELLULAR_UART_BUFFER_SIZES=6000
CONFIG_MODEM_CMUX_MTU=127
CONFIG_MODEM_CMUX_WORK_BUFFER_SIZE_EXTRA=2048
CONFIG_MODEM_STATS=y
CONFIG_MODEM_LOG_LEVEL_INF=y
CONFIG_MODEM_CMUX_LOG_LEVEL_DBG=y
CONFIG_MODEM_MODULES_LOG_LEVEL_INF=y

# --- PPP networking ---
CONFIG_NET_NATIVE=y
CONFIG_NET_L2_PPP=y
CONFIG_NET_SOCKETS_OFFLOAD=n
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_CONTEXT_RCVTIMEO=y
CONFIG_NET_CONTEXT_SNDTIMEO=y

# --- Network management ---
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_CONNECTION_MANAGER=y

# --- DNS (using PPP DNS option) ---
CONFIG_DNS_RESOLVER=y
CONFIG_NET_L2_PPP_OPTION_DNS_USE=y

# --- TLS/DTLS (native, not modem-offloaded) ---
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_ENABLE_DTLS=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=1
CONFIG_NET_SOCKETS_TLS_SET_MAX_FRAGMENT_LENGTH=y

# --- Power management ---
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y

# --- Disable nRF Modem Library and nRF91-specific features ---
CONFIG_NRF_MODEM_LIB=n
CONFIG_LTE_LINK_CONTROL=n
CONFIG_MODEM_INFO=n
CONFIG_MODEM_JWT=n
CONFIG_MODEM_KEY_MGMT=n
CONFIG_MODEM_ATTEST_TOKEN=n
CONFIG_AT_SHELL=n
CONFIG_LTE_PSM_REQ=n
CONFIG_LTE_EDRX_REQ=n
CONFIG_LTE_NETWORK_MODE_LTE_M_NBIOT_GPS=n

# --- Location module (stub, no real GNSS on nRF54LM20) ---
CONFIG_LOCATION=n
CONFIG_APP_LOCATION=y
CONFIG_NRF_CLOUD_AGNSS=n

# --- Disable FOTA ---
CONFIG_NRF_CLOUD_FOTA_POLL=n
CONFIG_NRF_CLOUD_FOTA_FULL_MODEM_UPDATE=n
CONFIG_NRF_CLOUD_COAP_DOWNLOADS=n
CONFIG_FOTA_DOWNLOAD=n
CONFIG_BOOTLOADER_MCUBOOT=n
CONFIG_IMG_MANAGER=n
CONFIG_MCUBOOT_IMG_MANAGER=n
CONFIG_STREAM_FLASH_ERASE=n
CONFIG_DFU_TARGET=n
CONFIG_DOWNLOADER=n
CONFIG_NRF_CLOUD_SEND_SERVICE_INFO_FOTA=n

# --- Disable nRF Cloud CoAP and nRF Provisioning ---
CONFIG_NRF_CLOUD=n
CONFIG_NRF_CLOUD_COAP=n
CONFIG_APP_CLOUD=n
CONFIG_NRF_PROVISIONING=n

# --- nRF Cloud without modem ---
CONFIG_NRF_CLOUD_JWT_SOURCE_CUSTOM=y
CONFIG_NRF_CLOUD_CLIENT_ID_SRC_HW_ID=y
CONFIG_NRF_CLOUD_CREDENTIALS_MGMT_TLS_CRED=y
CONFIG_NRF_CLOUD_SEND_DEVICE_STATUS_NETWORK=n
CONFIG_NRF_CLOUD_SEND_DEVICE_STATUS_SIM=n
CONFIG_NRF_CLOUD_CHECK_CREDENTIALS=n

# --- Hardware ID ---
# IMEI source requires nRF Modem Library; use device ID (hwinfo) instead.
CONFIG_HW_ID_LIBRARY_SOURCE_IMEI=n
CONFIG_HW_ID_LIBRARY_SOURCE_DEVICE_ID=y

# --- Date/Time via NTP (not modem) ---
CONFIG_DATE_TIME=n
CONFIG_DATE_TIME_NTP=y
CONFIG_DATE_TIME_MODEM=n

# --- Settings ---
CONFIG_SETTINGS=n

# --- Memory adjustments ---
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1536
CONFIG_HEAP_MEM_POOL_SIZE=12288
CONFIG_MAIN_STACK_SIZE=2560

# TLS credential management (for MQTT and nRF Cloud)
CONFIG_TLS_CREDENTIALS=y
CONFIG_TLS_CREDENTIALS_BACKEND_VOLATILE=y

# MbedTLS configuration
CONFIG_NRF_SECURITY=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_PEM_PARSE_C=y
CONFIG_MBEDTLS_SSL_KEEP_PEER_CERTIFICATE=n
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y
CONFIG_MBEDTLS_RSA_C=y
CONFIG_MBEDTLS_HEAP_SIZE=51200

# PSA Crypto options
CONFIG_PSA_WANT_ALG_ECDH=y
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_PSA_WANT_ECC_SECP_R1_256=y
CONFIG_PSA_WANT_ECC_SECP_R1_384=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_IMPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_EXPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_GENERATE=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y

# RSA support for parsing RSA-signed certificates (e.g., Mosquitto CA)
# Works in non-TF-M builds where legacy crypto doesn't conflict with oberon
CONFIG_MBEDTLS_LEGACY_CRYPTO_C=y
CONFIG_MBEDTLS_RSA_C=y
