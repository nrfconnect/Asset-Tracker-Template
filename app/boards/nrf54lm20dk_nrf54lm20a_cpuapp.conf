# --- UART configuration for Serial Modem ---
CONFIG_UART_ASYNC_API=y

# --- Zephyr modem subsystem (CMUX+PPP+chat, no modem_cellular driver) ---
CONFIG_MODEM=y
CONFIG_MODEM_MODULES=y
CONFIG_MODEM_BACKEND_UART=y
CONFIG_MODEM_BACKEND_UART_ASYNC=y
CONFIG_MODEM_BACKEND_UART_ASYNC_HWFC=y
CONFIG_MODEM_CMUX=y
CONFIG_MODEM_CMUX_MTU=127
CONFIG_MODEM_CMUX_WORK_BUFFER_SIZE_EXTRA=2048
CONFIG_MODEM_CHAT=y
CONFIG_MODEM_PPP=y
CONFIG_MODEM_STATS=y
CONFIG_MODEM_LOG_LEVEL_INF=y
CONFIG_MODEM_CMUX_LOG_LEVEL_DBG=y
CONFIG_MODEM_MODULES_LOG_LEVEL_WRN=y
# Use dedicated workqueue for modem to prevent system workqueue starvation
CONFIG_MODEM_DEDICATED_WORKQUEUE=y
CONFIG_MODEM_DEDICATED_WORKQUEUE_STACK_SIZE=2048
CONFIG_MODEM_DEDICATED_WORKQUEUE_PRIORITY=5

# --- nRF Modem Library proxy over Zephyr modem subsystem ---
CONFIG_NRF_MODEM_LIB=y
CONFIG_NRF_MODEM_LIB_ZEPHYR_MODEM=y
CONFIG_NRF_MODEM_LIB_ZEPHYR_MODEM_UART_BUF_SIZE=4096

# --- LTE libraries (via AT proxy) ---
CONFIG_LTE_LINK_CONTROL=y
CONFIG_MODEM_INFO=y
CONFIG_NRF_MODEM_LIB_CFUN_HOOKS=y

# --- PPP networking ---
CONFIG_NET_NATIVE=y
CONFIG_NET_L2_PPP=y
CONFIG_NET_SOCKETS_OFFLOAD=n
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_CONTEXT_RCVTIMEO=y
CONFIG_NET_CONTEXT_SNDTIMEO=y
CONFIG_COAP_CLIENT_STACK_SIZE=8192
# Increase net packet counts to prevent "Dropped frame, no net_pkt available"
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
# # Enable IPv6 so IPv6CP is negotiated over PPP (nRF Cloud provisioning endpoint
# # only responds to DTLS over IPv6 on this network path)
# CONFIG_NET_IPV6=y

# --- DNS (using PPP DNS option) ---
CONFIG_DNS_RESOLVER=y
CONFIG_NET_L2_PPP_OPTION_DNS_USE=y
# # With NET_IPV6=y, IPv4 IPCP and IPv6 IPv6CP each provide a DNS server.
# # Use 2 server slots so IPv6CP reconfiguration does not cancel in-flight IPv4 DNS queries.
# CONFIG_DNS_RESOLVER_MAX_SERVERS=2
# # Allow both A and AAAA results when AF_UNSPEC is used by provisioning code.
# CONFIG_DNS_RESOLVER_AI_MAX_ENTRIES=4

# --- TLS/DTLS (native, not modem-offloaded) ---
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_ENABLE_DTLS=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=1
CONFIG_NET_SOCKETS_TLS_SET_MAX_FRAGMENT_LENGTH=y

# --- Location module ---
CONFIG_NRF_CLOUD_AGNSS=n
CONFIG_LOCATION_METHOD_GNSS=n
CONFIG_LOCATION_METHOD_WIFI=n
CONFIG_LOCATION_METHOD_CELLULAR=y
CONFIG_LOCATION_REQUEST_DEFAULT_METHOD_FIRST_CELLULAR=y
CONFIG_LOCATION_REQUEST_DEFAULT_METHOD_SECOND_NONE=y
CONFIG_LOCATION_REQUEST_DEFAULT_METHOD_THIRD_NONE=y

# --- FOTA: stub only (NRF_CLOUD_FOTA_POLL requires SOC_SERIES_NRF91 assumptions
# around full modem update; MCUboot swap is not wired up for nRF54L yet).
# APP_FOTA stays enabled so the zbus channel and state machine handlers in
# main.c continue to compile; the stub just publishes FOTA_MODULE_READY.
CONFIG_NRF_CLOUD_FOTA_POLL=n
CONFIG_NRF_CLOUD_FOTA_POLL_LOG_LEVEL_DBG=n
CONFIG_NRF_CLOUD_FOTA_FULL_MODEM_UPDATE=n
CONFIG_NRF_CLOUD_COAP_DOWNLOADS=n
CONFIG_FOTA_DOWNLOAD=n
CONFIG_BOOTLOADER_MCUBOOT=n
CONFIG_IMG_MANAGER=n
CONFIG_MCUBOOT_IMG_MANAGER=n
CONFIG_DFU_TARGET=n
CONFIG_DOWNLOADER=n
CONFIG_NRF_CLOUD_SEND_SERVICE_INFO_FOTA=n

# --- Memory adjustments ---
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1536
CONFIG_HEAP_MEM_POOL_SIZE=12288
CONFIG_MAIN_STACK_SIZE=2560

# --- nRF Cloud CoAP credentials ---
# nRF Provisioning's cert_provision() calls tls_credential_add() to store the CoAP root CA
# at sec tag 189298 (CONFIG_NRF_PROVISIONING_ROOT_CA_SEC_TAG default) in the Zephyr TLS store.
# Point nRF Cloud CoAP to that same sec tag so the same CA is used for DTLS to coap.nrfcloud.com.
CONFIG_NRF_CLOUD_COAP_SEC_TAG=189298
# Use the provisioned private key (sec tag 16842753) for JWT signing, separate from the DTLS
# CA cert sec tag (189298). The private key at 16842753 is stored in the nRF91 modem's
# credential store by nRF Provisioning (via AT%KEYGEN + AT%CMNG). AT%JWT on the nRF91 uses
# its own store, while the Zephyr TLS stack on the nRF54LM20 uses the sec tag 189298 CA cert.
CONFIG_NRF_CLOUD_COAP_JWT_SEC_TAG=16842753
# Use Zephyr TLS credential store (not modem NVM) - required for native TLS on nRF54LM20
CONFIG_NRF_CLOUD_CREDENTIALS_MGMT_TLS_CRED=y

# --- MbedTLS configuration (native TLS, no TF-M offload) ---
CONFIG_NRF_SECURITY=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_LEGACY_CRYPTO_C=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_PEM_PARSE_C=y
CONFIG_MBEDTLS_SSL_KEEP_PEER_CERTIFICATE=n
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y
CONFIG_MBEDTLS_SSL_DTLS_CONNECTION_ID=y
CONFIG_MBEDTLS_RSA_C=y
CONFIG_MBEDTLS_HEAP_SIZE=81920

# PSA Crypto options
CONFIG_PSA_WANT_ALG_ECDH=y
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_PSA_WANT_ECC_SECP_R1_256=y
CONFIG_PSA_WANT_ECC_SECP_R1_384=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_IMPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_EXPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_GENERATE=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y
CONFIG_PSA_WANT_KEY_TYPE_AES=y
CONFIG_PSA_WANT_ALG_GCM=y
CONFIG_PSA_WANT_ALG_CCM=y
CONFIG_PSA_WANT_ALG_SHA_256=y
CONFIG_PSA_WANT_ALG_HMAC=y

CONFIG_APP_NETWORK_THREAD_STACK_SIZE=8192
CONFIG_MAIN_STACK_SIZE=32684
CONFIG_LTE_LC_WORKQUEUE_STACK_SIZE=6144
CONFIG_DATE_TIME_THREAD_STACK_SIZE=6144
CONFIG_DATE_TIME_NTP=n
CONFIG_APP_CLOUD_THREAD_STACK_SIZE=40000
CONFIG_NRF_PROVISIONING_STACK_SIZE=16384
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_DATE_TIME_RETRY_COUNT=5
CONFIG_NET_SOCKETS_DNS_TIMEOUT=30000
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
CONFIG_SHELL_STACK_SIZE=6144

# CONFIG_NET_LOG=y
# CONFIG_MBEDTLS_DEBUG=y
# CONFIG_MBEDTLS_SSL_DEBUG_ALL=y
# CONFIG_MBEDTLS_LOG_LEVEL_DBG=y
# CONFIG_MBEDTLS_DEBUG_C=y
# CONFIG_MBEDTLS_DEBUG_LEVEL=4
# CONFIG_NET_SOCKETS_LOG_LEVEL_DBG=y
# CONFIG_LOG_BUFFER_SIZE=50000

# --- DNS debug (uncomment to diagnose getaddrinfo failures) ---
# DNS_EAI_SYSTEM (-11) with errno=2 (ENOENT) = no DNS servers registered yet (PPP IPCP pending)
# DNS_EAI_SYSTEM (-11) with errno!=2 = socket/query error; DNS_EAI_AGAIN (-3) = temp failure
CONFIG_DNS_RESOLVER_LOG_LEVEL_DBG=y
CONFIG_DNS_SOCKET_DISPATCHER_LOG_LEVEL_DBG=y

CONFIG_RESET_ON_FATAL_ERROR=n

# Increase storage thread stack for Memfault overhead
CONFIG_APP_STORAGE_THREAD_STACK_SIZE=4096
