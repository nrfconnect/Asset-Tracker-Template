#
# Asset Tracker Template configuration for the nRF54LM20 application core
# acting as the host of an external nRF91-based modem running ncs-serial-modem.
#
# The host uses the upstream Zephyr cellular modem stack (modem_cellular
# driver + CMUX + PPP + chat) instead of the nRF Modem Library, and brings
# the link up/down through Zephyr's connection manager (NETWORK_BACKEND_CONN_MGR).
# Native MbedTLS (no TF-M offload) is used for cloud connections.
#

# --- UART configuration for Serial Modem ---
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y
CONFIG_UART_USE_RUNTIME_CONFIGURE=y

# --- Zephyr cellular modem driver (CMUX + PPP + chat) ---
CONFIG_MODEM=y
CONFIG_MODEM_MODULES=y
CONFIG_MODEM_CELLULAR=y
CONFIG_MODEM_CELLULAR_APN=""
CONFIG_MODEM_CELLULAR_UART_BUFFER_SIZES=512
CONFIG_MODEM_CMUX_MTU=127
CONFIG_MODEM_CMUX_WORK_BUFFER_SIZE_EXTRA=2048
CONFIG_MODEM_BACKEND_UART_ASYNC_HWFC=y
CONFIG_MODEM_STATS=y
# Use a dedicated workqueue for the modem subsystem to keep the system
# workqueue free for application work (zbus, location, cloud, etc.).
CONFIG_MODEM_DEDICATED_WORKQUEUE=y
CONFIG_MODEM_DEDICATED_WORKQUEUE_STACK_SIZE=2048
CONFIG_MODEM_DEDICATED_WORKQUEUE_PRIORITY=5

# --- Networking: PPP + native sockets, no offload ---
CONFIG_NET_NATIVE=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS_OFFLOAD=n
CONFIG_NET_CONTEXT_RCVTIMEO=y
CONFIG_NET_CONTEXT_SNDTIMEO=y
CONFIG_NET_L2_PPP=y
CONFIG_NET_L2_PPP_OPTION_DNS_USE=y
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32

# --- Connection manager (network module backend) ---
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
# Default NET_MGMT stack (768 B) is too small for our callbacks: zbus
# publish + downstream notifies/subscribers, and the burst of NET_EVENT_*
# fired during PPP/CMUX bring-up overflow it. Bump the queue too.
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=10
CONFIG_APP_NETWORK_BACKEND_CONN_MGR=y

# --- DNS resolver (uses DNS server obtained via PPP IPCP) ---
CONFIG_DNS_RESOLVER=y
CONFIG_NET_SOCKETS_DNS_TIMEOUT=30000

# --- Native TLS / MbedTLS / PSA Crypto (no modem-offloaded TLS) ---
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_ENABLE_DTLS=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=1
CONFIG_NET_SOCKETS_TLS_SET_MAX_FRAGMENT_LENGTH=y
CONFIG_TLS_CREDENTIALS=y
CONFIG_TLS_CREDENTIALS_BACKEND_VOLATILE=y

# Native TLS via NCS MbedTLS/nrf_security (DTLS for nRF Cloud CoAP + provisioning)
CONFIG_PSA_CRYPTO=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=81920
CONFIG_MBEDTLS_PEM_PARSE_C=y
CONFIG_MBEDTLS_SSL_KEEP_PEER_CERTIFICATE=n
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y
CONFIG_MBEDTLS_DECLARE_PRIVATE_IDENTIFIERS=y
CONFIG_MBEDTLS_MD_C=y
CONFIG_MBEDTLS_HMAC_DRBG_C=y
CONFIG_MBEDTLS_SHA256_C=y
CONFIG_MBEDTLS_ECP_C=y
CONFIG_MBEDTLS_ECDSA_C=y
CONFIG_MBEDTLS_CTR_DRBG_C=y
CONFIG_MBEDTLS_AES_C=y
CONFIG_MBEDTLS_ENTROPY_C=y
CONFIG_PSA_WANT_ALG_ECDH=y
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_PSA_WANT_ALG_GCM=y
CONFIG_PSA_WANT_ECC_SECP_R1_256=y
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_ECDSA_ENABLED=y

# --- Stack and heap tuning ---
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
CONFIG_SHELL_STACK_SIZE=6144
CONFIG_APP_NETWORK_THREAD_STACK_SIZE=4096
CONFIG_APP_CLOUD_THREAD_STACK_SIZE=8192
CONFIG_APP_STORAGE_THREAD_STACK_SIZE=4096
CONFIG_DATE_TIME_THREAD_STACK_SIZE=4096
CONFIG_DATE_TIME_NTP=y
CONFIG_DATE_TIME_RETRY_COUNT=5

CONFIG_RESET_ON_FATAL_ERROR=n

# --- Location / FOTA modules omitted (no NCS Location lib / nRF Cloud FOTA on host)
CONFIG_LOCATION=n
CONFIG_APP_LOCATION=n
CONFIG_APP_FOTA=n

# --- HW ID source (SoC FICR via HWINFO; no modem IMEI on this host) ---
CONFIG_HW_ID_LIBRARY=y
CONFIG_HW_ID_LIBRARY_SOURCE_DEVICE_ID=y

# --- Memfault disabled on Serial Modem host (focus: provisioning + nRF Cloud) ---
CONFIG_MEMFAULT=n

# --- AT user pipe on modem_cellular (DLCI 1 / Serial Modem AT channel) ---
CONFIG_MODEM_AT_USER_PIPE=y
CONFIG_MODEM_AT_USER_PIPE_IDX=0

# --- nRF Device Provisioning (host, via modem_cellular AT pipe) ---
CONFIG_NRF_PROVISIONING=y
CONFIG_NRF_PROVISIONING_BACKEND_MODEM_CELLULAR=y
CONFIG_NRF_PROVISIONING_COAP=y
CONFIG_NRF_PROVISIONING_CODEC=y
CONFIG_NRF_PROVISIONING_CBOR=y
CONFIG_NRF_PROVISIONING_WITH_CERT=y
CONFIG_NRF_PROVISIONING_CBOR_RECORDS=5
CONFIG_NRF_PROVISIONING_RX_BUF_SZ=2560
CONFIG_NRF_PROVISIONING_TX_BUF_SZ=2048
CONFIG_NRF_PROVISIONING_CODEC_AT_CMD_LEN=2048
CONFIG_NRF_PROVISIONING_CODEC_RX_SZ_START=1024
CONFIG_NRF_PROVISIONING_AUTO_START_ON_INIT=y

# --- nRF Cloud CoAP on host (JWT/credentials on modem via AT user pipe) ---
CONFIG_NRF_CLOUD=y
CONFIG_NRF_CLOUD_COAP=y
CONFIG_NRF_CLOUD_COAP_MAX_RETRIES=3
CONFIG_NRF_CLOUD_COAP_DISCONNECT_ON_FAILED_REQUEST=y
# Memfault disabled on nRF54 host; no nrf_cloud_coap_get_user_options provider
CONFIG_NRF_CLOUD_COAP_MAX_USER_OPTIONS=0
CONFIG_NRF_CLOUD_PRINT_DETAILS=n
CONFIG_NRF_CLOUD_SEND_SHADOW_INFO_ON_CONNECT=n
# Device status shadow requires MODEM_INFO (nRF Modem Lib on-chip modem only)
CONFIG_NRF_CLOUD_SEND_DEVICE_STATUS=n
CONFIG_NRF_CLOUD_SEND_DEVICE_STATUS_NETWORK=n
CONFIG_NRF_CLOUD_MODEM_CELLULAR=y
CONFIG_NRF_CLOUD_CLIENT_ID_SRC_MDM_DEVICE_UUID=y
CONFIG_NRF_CLOUD_CHECK_CREDENTIALS=y
CONFIG_NRF_CLOUD_CREDENTIALS_MGMT_MODEM_CELLULAR=y
CONFIG_NRF_CLOUD_CREDENTIALS_SYNC_FROM_MODEM=y
CONFIG_NRF_CLOUD_JWT_SOURCE_MODEM_CELLULAR=y

CONFIG_COAP=y
CONFIG_COAP_EXTENDED_OPTIONS_LEN=y
CONFIG_COAP_CLIENT=y
CONFIG_COAP_CLIENT_MAX_EXTRA_OPTIONS=3
CONFIG_COAP_MAX_RETRANSMIT=1
CONFIG_COAP_INIT_ACK_TIMEOUT_MS=5000
CONFIG_COAP_CLIENT_BLOCK_SIZE=1024
CONFIG_COAP_CLIENT_MESSAGE_SIZE=1024
CONFIG_COAP_CLIENT_STACK_SIZE=1280

# FOTA requires nRF Modem on host; disabled until nRF54 FOTA path exists
CONFIG_NRF_CLOUD_FOTA_POLL=n
