# External flash (MCUboot secondary on GD25)
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_SFDP_DEVICETREE=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096

# TF-M - Crypto is offloaded to the modem so the minimal profile is sufficient.
CONFIG_TFM_PROFILE_TYPE_MINIMAL=y
# Set these options to make TF-M fit within the allocated TF-M flash and RAM partitions.
CONFIG_TFM_PSA_FRAMEWORK_HAS_MM_IOVEC=y
CONFIG_PSA_WANT_ALG_CTR_DRBG=y
# TFM logging over uart0
CONFIG_TFM_LOG_LEVEL_SILENCE=n
CONFIG_TFM_SECURE_UART0=y
CONFIG_TFM_SECURE_UART_SHARE_INSTANCE=y
CONFIG_TFM_EXCEPTION_INFO_DUMP=y
CONFIG_TFM_SPM_LOG_LEVEL_INFO=y

# Modem library shared memory buffers - 4KB is sufficient for this application
CONFIG_NRF_MODEM_LIB_SHMEM_TX_SIZE=4096
CONFIG_NRF_MODEM_LIB_SHMEM_RX_SIZE=4096

# Environmental module
CONFIG_APP_ENVIRONMENTAL=y

# Enable BME680
CONFIG_BME680=y

# Power module
CONFIG_APP_POWER=y

# LED module
CONFIG_APP_LED=y
CONFIG_APP_LED_LOG_LEVEL_DBG=y

# Fuel Gage
CONFIG_NRF_FUEL_GAUGE=y
CONFIG_NPM13XX_CHARGER=y

# Wi-Fi
CONFIG_WIFI=y
CONFIG_WIFI_NRF70=y
CONFIG_WIFI_NRF70_LOG_LEVEL_ERR=y
CONFIG_WIFI_NRF70_SKIP_LOCAL_ADMIN_MAC=y
CONFIG_NRF70_BH_WQ_STACK_SIZE=1024
CONFIG_NRF70_IRQ_WQ_STACK_SIZE=1024
# Scan only 2.4 GHz channels. Most commercial APs use channels 1, 6, and 11 (all 2.4 GHz),
# providing sufficient AP coverage for Wi-Fi location while reducing scan time.
CONFIG_NRF_WIFI_2G_BAND=y
# Scan only using offload API
CONFIG_WIFI_NM_WPA_SUPPLICANT=n

# Memory optimizations
CONFIG_NET_BUF_RX_COUNT=1
CONFIG_NET_BUF_TX_COUNT=1
CONFIG_NET_PKT_RX_COUNT=1
CONFIG_NET_PKT_TX_COUNT=1
CONFIG_NET_TX_STACK_SIZE=512
CONFIG_NET_RX_STACK_SIZE=512
CONFIG_NET_TC_TX_COUNT=1
CONFIG_NET_MAX_CONTEXTS=1
CONFIG_NET_MGMT_EVENT_STACK_SIZE=1280

# Wifi scan requires extended heap size
CONFIG_NRF_WIFI_CTRL_HEAP_SIZE=10240

# Configure location priority order and timeouts
CONFIG_LOCATION_METHOD_WIFI=y
CONFIG_LOCATION_WORKQUEUE_STACK_SIZE=4096
CONFIG_LOCATION_REQUEST_DEFAULT_METHOD_FIRST_GNSS=y
CONFIG_LOCATION_REQUEST_DEFAULT_METHOD_SECOND_WIFI=y
CONFIG_LOCATION_REQUEST_DEFAULT_METHOD_THIRD_CELLULAR=y
CONFIG_LOCATION_REQUEST_DEFAULT_WIFI_TIMEOUT=5000

# GNSS location options (depend on LOCATION_METHOD_GNSS)
CONFIG_LOCATION_REQUEST_DEFAULT_GNSS_TIMEOUT=60000
CONFIG_LOCATION_REQUEST_DEFAULT_GNSS_VISIBILITY_DETECTION=y
CONFIG_LOCATION_REQUEST_DEFAULT_GNSS_ACCURACY_LOW=y
CONFIG_LTE_NETWORK_MODE_LTE_M_NBIOT_GPS=y
CONFIG_LTE_NEIGHBOR_CELLS_MAX=8

# Required for explicit-erase flash (nRF91 internal flash)
CONFIG_STREAM_FLASH_ERASE=y
## Align this with CONFIG_NRF_WIFI_SCAN_MAX_BSS_CNT
CONFIG_LOCATION_METHOD_WIFI_SCANNING_RESULTS_MAX_CNT=10
CONFIG_NRF_WIFI_SCAN_MAX_BSS_CNT=10

# Debug logging
CONFIG_APP_POWER_LOG_LEVEL_DBG=y
CONFIG_APP_ENVIRONMENTAL_LOG_LEVEL_DBG=y

# nRF Modem Library and AT command access
CONFIG_NRF_MODEM_LIB=y
CONFIG_AT_SHELL=y
CONFIG_AT_MONITOR_HEAP_SIZE=2176

# LTE Link Control modules
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_LC_PDN_MODULE=y
CONFIG_LTE_LC_PSM_MODULE=y
CONFIG_LTE_LC_EDRX_MODULE=y
CONFIG_LTE_LC_WORKQUEUE_STACK_SIZE=896

# PSM (Power Saving Mode)
CONFIG_LTE_PSM_REQ=y
CONFIG_LTE_PROPRIETARY_PSM_REQ=y
CONFIG_LTE_PSM_REQ_FORMAT_SECONDS=y
CONFIG_LTE_PSM_REQ_RPTAU_SECONDS=7200
CONFIG_LTE_PSM_REQ_RAT_SECONDS=6

# eDRX (Extended Discontinuous Reception)
CONFIG_LTE_EDRX_REQ=y
CONFIG_LTE_EDRX_REQ_VALUE_LTE_M="0000"
CONFIG_LTE_EDRX_REQ_VALUE_NBIOT="0000"

# Modem info / JWT / Key management
CONFIG_MODEM_INFO=y
CONFIG_MODEM_INFO_ADD_DEVICE=y
CONFIG_MODEM_KEY_MGMT=y
CONFIG_MODEM_JWT=y
CONFIG_MODEM_ATTEST_TOKEN=y
CONFIG_HW_ID_LIBRARY_SOURCE_UUID=y

# nRF Cloud (CoAP transport)
CONFIG_NRF_CLOUD=y
CONFIG_NRF_CLOUD_COAP=y
CONFIG_NRF_CLOUD_COAP_MAX_RETRIES=3
CONFIG_NRF_CLOUD_COAP_DISCONNECT_ON_FAILED_REQUEST=y
CONFIG_NRF_CLOUD_COAP_MAX_USER_OPTIONS=2
CONFIG_NRF_CLOUD_PRINT_DETAILS=n
CONFIG_NRF_CLOUD_SEND_SHADOW_INFO_ON_CONNECT=n
CONFIG_NRF_CLOUD_SEND_DEVICE_STATUS=y
CONFIG_NRF_CLOUD_SEND_DEVICE_STATUS_NETWORK=y
CONFIG_NRF_CLOUD_SEND_DEVICE_STATUS_SIM=y
CONFIG_NRF_CLOUD_SEND_SERVICE_INFO_FOTA=y
CONFIG_NRF_CLOUD_AGNSS=y
CONFIG_NRF_CLOUD_LOG_DIRECT=n
CONFIG_NRF_CLOUD_LOG_OUTPUT_LEVEL=3
CONFIG_NRF_CLOUD_CLIENT_ID_SRC_INTERNAL_UUID=y
CONFIG_NRF_CLOUD_CHECK_CREDENTIALS=y
CONFIG_NRF_CLOUD_CREDENTIALS_MGMT_MODEM=y

# nRF Cloud FOTA
CONFIG_NRF_CLOUD_FOTA_POLL=y
CONFIG_NRF_CLOUD_FOTA_FULL_MODEM_UPDATE=y
CONFIG_NRF_CLOUD_FOTA_FULL_MODEM_UPDATE_BUF_SIZE=1024
CONFIG_NRF_CLOUD_FOTA_DOWNLOAD_FRAGMENT_SIZE=1900
CONFIG_NRF_CLOUD_COAP_DOWNLOADS=y
CONFIG_FOTA_DOWNLOAD=y
CONFIG_FOTA_DOWNLOAD_PROGRESS_EVT=y
CONFIG_FOTA_DL_TIMEOUT_MIN=60
CONFIG_FOTA_SOCKET_RETRIES=5
CONFIG_DFU_TARGET=y
CONFIG_DOWNLOADER=y
CONFIG_DOWNLOADER_STACK_SIZE=2000

# MCUboot - needed for FOTA
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y

# nRF Provisioning
CONFIG_NRF_PROVISIONING=y
CONFIG_NRF_PROVISIONING_CBOR_RECORDS=5
CONFIG_NRF_PROVISIONING_COAP=y
CONFIG_NRF_PROVISIONING_CODEC=y
CONFIG_NRF_PROVISIONING_CBOR=y
CONFIG_NRF_PROVISIONING_WITH_CERT=y
CONFIG_NRF_PROVISIONING_RX_BUF_SZ=2560
CONFIG_NRF_PROVISIONING_TX_BUF_SZ=2048
CONFIG_NRF_PROVISIONING_CODEC_AT_CMD_LEN=2048
CONFIG_NRF_PROVISIONING_CODEC_RX_SZ_START=1024

# Location framework (base; Wi-Fi/GNSS tuning below)
CONFIG_APP_LOCATION=y
CONFIG_APP_FOTA=y
CONFIG_APP_LOCATION_LOG_LEVEL_DBG=y
CONFIG_APP_FOTA_LOG_LEVEL_DBG=y
CONFIG_LOCATION=y
CONFIG_LOCATION_DATA_DETAILS=y
CONFIG_LOCATION_METHOD_GNSS=y
CONFIG_LOCATION_METHOD_CELLULAR=y
CONFIG_LOCATION_SERVICE_EXTERNAL=y
CONFIG_LOCATION_REQUEST_DEFAULT_CELLULAR_TIMEOUT=30000
CONFIG_LOCATION_REQUEST_DEFAULT_TIMEOUT=120000
CONFIG_LOCATION_REQUEST_DEFAULT_CELLULAR_CELL_COUNT=3
CONFIG_APP_LOCATION_NEIGHBOR_CELLS_MAX=8

# Memfault (logging + storage; cloud upload in section below)
CONFIG_MEMFAULT=y
CONFIG_MEMFAULT_NCS_FW_TYPE="att"
CONFIG_MEMFAULT_LOGGING_ENABLE=y
CONFIG_MEMFAULT_LOGGING_RAM_SIZE=4096
CONFIG_MEMFAULT_EVENT_STORAGE_SIZE=2048
CONFIG_MEMFAULT_COREDUMP_STACK_SIZE_TO_COLLECT=512
CONFIG_MEMFAULT_HTTP_ENABLE=n
CONFIG_MEMFAULT_NCS_STACK_METRICS=n
CONFIG_MEMFAULT_FS_BYTES_FREE_METRIC=n
CONFIG_POSIX_FILE_SYSTEM=n

# Memfault: NCS-specific upload over nRF Cloud CoAP
CONFIG_PM_PARTITION_SIZE_MEMFAULT_STORAGE=0x8000
CONFIG_MEMFAULT_COAP_MAX_POST_SIZE=972
CONFIG_MEMFAULT_COAP_MAX_MESSAGES_TO_SEND=10000
CONFIG_MEMFAULT_NCS_INTERNAL_FLASH_BACKED_COREDUMP=y
CONFIG_MEMFAULT_NCS_POST_COREDUMP_ON_NETWORK_CONNECTED=y
CONFIG_MEMFAULT_PERIODIC_UPLOAD_USE_DEDICATED_WORKQUEUE=y
CONFIG_MEMFAULT_USE_NRF_CLOUD_COAP=y
CONFIG_MEMFAULT_NCS_LTE_METRICS=y
CONFIG_MEMFAULT_NCS_LOCATION_METRICS=y

# CoAP client tuning
CONFIG_COAP_MAX_RETRANSMIT=1
CONFIG_COAP_INIT_ACK_TIMEOUT_MS=5000
CONFIG_COAP_CLIENT_THREAD_PRIORITY=14
CONFIG_COAP_CLIENT_BLOCK_SIZE=1024
CONFIG_COAP_CLIENT_MESSAGE_SIZE=1024
CONFIG_COAP_CLIENT_STACK_SIZE=1280
CONFIG_COAP_EXTENDED_OPTIONS_LEN_VALUE=192
CONFIG_COAP_CLIENT_MAX_PATH_LENGTH=128
CONFIG_COAP_CLIENT_MAX_EXTRA_OPTIONS=3

# Network module backend (LTE link controller)
CONFIG_APP_NETWORK_BACKEND_LTE_LC=y
